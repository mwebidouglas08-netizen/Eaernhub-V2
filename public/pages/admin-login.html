<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EarnHub – Admin Access</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#E8900A;--dark:#0F172A;--body:#F8FAFC;--card:#fff;--border:#E2E8F0;--text:#1E293B;--muted:#64748B;--red:#DC2626;--green:#16A34A;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.card{background:var(--card);border-radius:22px;padding:2.8rem 2.2rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.badge{display:inline-flex;align-items:center;gap:.4rem;background:#FEF2F2;border:1px solid #FECACA;border-radius:50px;padding:.3rem .75rem;font-size:.74rem;color:var(--red);margin-bottom:1.4rem;font-weight:700;}
.logo{font-size:1.7rem;font-weight:800;color:var(--dark);text-align:center;margin-bottom:.25rem;}
.logo span{color:var(--gold);}
.sub{text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:2rem;}
.fg{margin-bottom:1.15rem;}
label{font-size:.82rem;font-weight:600;margin-bottom:.35rem;display:block;}
input{width:100%;padding:.75rem 1rem;background:var(--body);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;font-family:'Plus Jakarta Sans',sans-serif;}
input:focus{border-color:var(--gold);background:#fff;}
input::placeholder{color:#CBD5E1;}
.btn{width:100%;padding:.88rem;background:var(--dark);color:#fff;font-weight:700;border:none;border-radius:10px;font-size:.97rem;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn:hover{background:#1E293B;transform:translateY(-1px);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.creds{background:#F8FAFC;border:1.5px solid var(--border);border-radius:10px;padding:.9rem 1rem;margin-bottom:1.2rem;font-size:.82rem;color:var(--muted);}
.creds strong{color:var(--text);}
.back{text-align:center;margin-top:1rem;font-size:.85rem;color:var(--muted);}
.back a{color:var(--gold);font-weight:600;}
.alert{padding:.7rem 1rem;border-radius:9px;font-size:.87rem;margin-bottom:.9rem;display:none;font-weight:500;}
.alert.error{background:#FEF2F2;border:1.5px solid #FECACA;color:var(--red);}
.alert.success{background:#F0FDF4;border:1.5px solid #BBF7D0;color:var(--green);}
</style>
</head>
<body>
<div class="card">
  <div style="text-align:center;"><div class="badge">🔐 Admin Portal — Restricted Access</div></div>
  <div class="logo">Earn<span>Hub</span></div>
  <div class="sub">Admin Dashboard Access Only</div>
  <div class="creds">
    <div>Username: <strong>earnhub_admin</strong></div>
    <div style="margin-top:.3rem;">Password: <strong>EarnHub@2024!</strong></div>
  </div>
  <div id="alert" class="alert"></div>
  <div class="fg"><label>Admin Username</label><input type="text" id="u" placeholder="Enter admin username" autocomplete="username"/></div>
  <div class="fg"><label>Password</label><input type="password" id="p" placeholder="Enter admin password" autocomplete="current-password"/></div>
  <button class="btn" id="btn" onclick="doLogin()">Access Dashboard →</button>
  <div class="back"><a href="/">← Back to EarnHub</a></div>
</div>
<script>
async function doLogin(){
  const btn=document.getElementById('btn');
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value;
  if(!u||!p){show('Enter credentials.','error');return;}
  btn.disabled=true;btn.textContent='Authenticating…';
  try{
    const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.success){show('Access granted! Redirecting…','success');setTimeout(()=>window.location.href='/admin/dashboard',600);}
    else{show(d.message,'error');btn.disabled=false;btn.textContent='Access Dashboard →';}
  }catch{show('Network error.','error');btn.disabled=false;btn.textContent='Access Dashboard →';}
}
function show(m,t){const e=document.getElementById('alert');e.textContent=m;e.className='alert '+t;e.style.display='block';}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
